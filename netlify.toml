[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# CMS admin redirect (Decap)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Netlify Identity → git-gateway for Decap auth
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# Long-cache static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/publications/*"
  to = "/research/publications/:splat"
  status = 301