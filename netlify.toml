[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# CMS admin redirect (Decap)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Publications moved under Research
[[redirects]]
  from = "/publications/*"
  to = "/research/publications/:splat"
  status = 301

# Research initiatives moved out of /programmes/ to live under their division
[[redirects]]
  from = "/programmes/sauti-project"
  to = "/research/initiatives/sauti-project"
  status = 301

[[redirects]]
  from = "/programmes/chownet"
  to = "/research/initiatives/chownet"
  status = 301

# Netlify Identity → git-gateway for Decap auth
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# Long-cache static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
